<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle with Rounded Corners -->
  <rect width="32" height="32" rx="8" fill="url(#logoGrad)" />
  
  <!-- Outer Compass Ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.35" />
  
  <!-- Graduation Cap (Base & Diamond Top) -->
  <path d="M16 8 L24 12 L16 16 L8 12 Z" fill="#ffffff" />
  <path d="M11 13.5 V17 C11 19 13.5 20.5 16 20.5 C18.5 20.5 21 19 21 17 V13.5" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  
  <!-- Compass Needle pointing North-East -->
  <path d="M16 16 L20 10 L16.5 13.5 Z" fill="url(#needleGrad)" />
  <path d="M16 16 L12 22 L15.5 18.5 Z" fill="#ffffff" fill-opacity="0.8" />
  
  <!-- Cardinal dots -->
  <circle cx="16" cy="6.5" r="0.75" fill="#ffffff" />
  <circle cx="25.5" cy="16" r="0.75" fill="#ffffff" />
  <circle cx="16" cy="25.5" r="0.75" fill="#ffffff" />
  <circle cx="6.5" cy="16" r="0.75" fill="#ffffff" />
</svg>
